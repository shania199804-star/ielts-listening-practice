<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>雅思王听力听写练习</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
            padding: 20px;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        
        h1 {
            text-align: center;
            margin-bottom: 10px;
            font-size: 1.8rem;
            background: linear-gradient(90deg, #00d4ff, #7b2cbf);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .subtitle {
            text-align: center;
            color: #888;
            margin-bottom: 30px;
            font-size: 0.9rem;
        }
        
        /* 模式选择 */
        .mode-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            justify-content: center;
        }
        
        .mode-btn {
            padding: 10px 24px;
            border: 2px solid #333;
            background: transparent;
            color: #888;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.95rem;
        }
        
        .mode-btn.active {
            border-color: #00d4ff;
            color: #00d4ff;
            background: rgba(0, 212, 255, 0.1);
        }
        
        /* 控制面板 */
        .control-panel {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            backdrop-filter: blur(10px);
        }
        
        .audio-controls {
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        .play-btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(135deg, #00d4ff, #7b2cbf);
            color: white;
            font-size: 24px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .play-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.4);
        }
        
        .speed-control {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .speed-label {
            color: #888;
            font-size: 0.9rem;
        }
        
        .speed-btn {
            padding: 8px 16px;
            border: 1px solid #444;
            background: transparent;
            color: #888;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.85rem;
        }
        
        .speed-btn:hover, .speed-btn.active {
            border-color: #00d4ff;
            color: #00d4ff;
            background: rgba(0, 212, 255, 0.1);
        }
        
        .progress-info {
            display: flex;
            justify-content: space-between;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid rgba(255,255,255,0.1);
            font-size: 0.9rem;
            color: #888;
        }
        
        .stats {
            display: flex;
            gap: 20px;
        }
        
        .stat {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .stat-value {
            color: #00d4ff;
            font-weight: bold;
        }
        
        /* 单词输入区 */
        .practice-area {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            backdrop-filter: blur(10px);
            min-height: 300px;
        }
        
        .word-input-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }
        
        .current-word-info {
            text-align: center;
        }
        
        .word-number {
            color: #888;
            font-size: 0.9rem;
            margin-bottom: 5px;
        }
        
        .word-input {
            width: 100%;
            max-width: 400px;
            padding: 15px 20px;
            font-size: 1.3rem;
            border: 2px solid #444;
            border-radius: 12px;
            background: rgba(0,0,0,0.3);
            color: #fff;
            text-align: center;
            transition: border-color 0.3s;
        }
        
        .word-input:focus {
            outline: none;
            border-color: #00d4ff;
        }
        
        .word-input.correct {
            border-color: #4ade80;
            background: rgba(74, 222, 128, 0.1);
        }
        
        .word-input.wrong {
            border-color: #f87171;
            background: rgba(248, 113, 113, 0.1);
        }
        
        .action-btns {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        .action-btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.95rem;
            transition: all 0.2s;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #00d4ff, #7b2cbf);
            color: white;
        }
        
        .btn-secondary {
            background: rgba(255,255,255,0.1);
            color: #fff;
        }
        
        .btn-success {
            background: #4ade80;
            color: #000;
        }
        
        .action-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
        }
        
        /* 整段模式 - 单词列表 */
        .batch-mode .words-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 10px;
            margin-top: 20px;
        }
        
        .batch-input {
            padding: 12px;
            border: 2px solid #444;
            border-radius: 8px;
            background: rgba(0,0,0,0.3);
            color: #fff;
            font-size: 1rem;
            text-align: center;
            transition: all 0.3s;
        }
        
        .batch-input:focus {
            outline: none;
            border-color: #00d4ff;
        }
        
        .batch-input.correct {
            border-color: #4ade80;
            background: rgba(74, 222, 128, 0.1);
        }
        
        .batch-input.wrong {
            border-color: #f87171;
            background: rgba(248, 113, 113, 0.1);
        }
        
        .batch-input:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        /* 结果显示 */
        .result-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.9);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            backdrop-filter: blur(10px);
        }
        
        .result-overlay.show {
            display: flex;
        }
        
        .result-card {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            max-width: 400px;
            width: 90%;
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .result-title {
            font-size: 1.5rem;
            margin-bottom: 20px;
        }
        
        .result-score {
            font-size: 4rem;
            font-weight: bold;
            background: linear-gradient(90deg, #00d4ff, #7b2cbf);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }
        
        .result-detail {
            color: #888;
            margin-bottom: 30px;
        }
        
        /* 数据导入 */
        .import-section {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
        }
        
        .import-section h3 {
            margin-bottom: 15px;
            font-size: 1rem;
            color: #888;
        }
        
        .file-input-wrapper {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .file-input {
            display: none;
        }
        
        .file-label {
            padding: 10px 20px;
            background: rgba(255,255,255,0.1);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.9rem;
        }
        
        .file-label:hover {
            background: rgba(255,255,255,0.2);
        }
        
        .json-editor {
            width: 100%;
            height: 150px;
            margin-top: 15px;
            padding: 15px;
            border: 1px solid #444;
            border-radius: 8px;
            background: rgba(0,0,0,0.3);
            color: #fff;
            font-family: monospace;
            font-size: 0.85rem;
            resize: vertical;
        }
        
        /* 单词本列表 */
        .word-list-preview {
            margin-top: 20px;
            max-height: 200px;
            overflow-y: auto;
            background: rgba(0,0,0,0.2);
            border-radius: 8px;
            padding: 15px;
        }
        
        .word-list-preview h4 {
            margin-bottom: 10px;
            color: #888;
            font-size: 0.9rem;
        }
        
        .word-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        
        .word-tag {
            padding: 5px 12px;
            background: rgba(0, 212, 255, 0.15);
            border-radius: 15px;
            font-size: 0.85rem;
            color: #00d4ff;
        }
        
        /* 响应式 */
        @media (max-width: 600px) {
            h1 {
                font-size: 1.4rem;
            }
            
            .speed-control {
                flex-wrap: wrap;
                justify-content: center;
            }
            
            .batch-mode .words-list {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        
        /* 提示信息 */
        .hint {
            text-align: center;
            color: #666;
            padding: 40px;
            font-size: 0.95rem;
        }
        
        .hint-icon {
            font-size: 3rem;
            margin-bottom: 15px;
            opacity: 0.5;
        }
        
        /* 快捷键提示 */
        .shortcuts {
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px solid rgba(255,255,255,0.1);
            font-size: 0.8rem;
            color: #666;
            text-align: center;
        }
        
        .shortcut-key {
            display: inline-block;
            padding: 2px 8px;
            background: rgba(255,255,255,0.1);
            border-radius: 4px;
            margin: 0 3px;
            font-family: monospace;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎧 雅思王听力听写练习</h1>
        <p class="subtitle">IELTS Listening Dictation Practice</p>
        
        <!-- 数据导入区 -->
        <div class="import-section">
            <h3>📁 导入单词数据</h3>
            <div class="file-input-wrapper">
                <input type="file" id="audioFile" class="file-input" accept="audio/*">
                <label for="audioFile" class="file-label">选择音频文件</label>
                
                <input type="file" id="jsonFile" class="file-input" accept=".json">
                <label for="jsonFile" class="file-label">导入JSON单词列表</label>
            </div>
            <textarea class="json-editor" id="jsonEditor" placeholder="或者在此粘贴JSON数据，格式：
{
  &quot;title&quot;: &quot;Test 1&quot;,
  &quot;words&quot;: [&quot;accommodation&quot;, &quot;schedule&quot;, &quot;deadline&quot;]
}">{
  "title": "雅思王听力 - Chapter 3 Test 1",
  "words": ["accommodation", "schedule", "deadline", "assignment", "tutorial", "seminar", "lecture", "library", "resource", "reference"]
}</textarea>
            <button class="action-btn btn-primary" onclick="loadData()" style="margin-top: 10px;">加载数据</button>
            
            <div class="word-list-preview" id="wordListPreview" style="display: none;">
                <h4>当前单词列表</h4>
                <div class="word-tags" id="wordTags"></div>
            </div>
        </div>
        
        <!-- 模式选择 -->
        <div class="mode-selector">
            <button class="mode-btn active" onclick="setMode('single')">🔤 单词模式</button>
            <button class="mode-btn" onclick="setMode('batch')">📝 整段模式</button>
        </div>
        
        <!-- 控制面板 -->
        <div class="control-panel">
            <div class="audio-controls">
                <button class="play-btn" id="playBtn" onclick="togglePlay()">▶</button>
                
                <div class="speed-control">
                    <span class="speed-label">倍速:</span>
                    <button class="speed-btn" onclick="setSpeed(0.5)">0.5x</button>
                    <button class="speed-btn" onclick="setSpeed(0.75)">0.75x</button>
                    <button class="speed-btn active" onclick="setSpeed(1)">1x</button>
                    <button class="speed-btn" onclick="setSpeed(1.25)">1.25x</button>
                    <button class="speed-btn" onclick="setSpeed(1.5)">1.5x</button>
                    <button class="speed-btn" onclick="setSpeed(2)">2x</button>
                </div>
            </div>
            
            <div class="progress-info">
                <span id="currentTitle">未加载数据</span>
                <div class="stats">
                    <div class="stat">
                        <span>进度:</span>
                        <span class="stat-value" id="progress">0/0</span>
                    </div>
                    <div class="stat">
                        <span>正确率:</span>
                        <span class="stat-value" id="accuracy">0%</span>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 练习区域 -->
        <div class="practice-area" id="practiceArea">
            <div class="hint">
                <div class="hint-icon">📂</div>
                <p>请先导入音频文件和单词数据</p>
                <p style="margin-top: 10px; font-size: 0.85rem;">支持 mp3, wav, m4a 等格式</p>
            </div>
        </div>
        
        <div class="shortcuts">
            快捷键: <span class="shortcut-key">Space</span> 播放/暂停 
            <span class="shortcut-key">Enter</span> 确认/下一题 
            <span class="shortcut-key">↑</span> 上一个 
            <span class="shortcut-key">↓</span> 下一个
        </div>
    </div>
    
    <!-- 结果弹窗 -->
    <div class="result-overlay" id="resultOverlay">
        <div class="result-card">
            <h2 class="result-title">🎉 练习完成!</h2>
            <div class="result-score" id="resultScore">0%</div>
            <p class="result-detail" id="resultDetail">0 正确 / 0 错误</p>
            <button class="action-btn btn-primary" onclick="restart()">再来一次</button>
            <button class="action-btn btn-secondary" onclick="closeResult()">查看详情</button>
        </div>
    </div>
    
    <audio id="audioPlayer"></audio>
    
    <script>
        // 状态管理
        let currentMode = 'single'; // 'single' 或 'batch'
        let words = [];
        let currentIndex = 0;
        let userAnswers = [];
        let audioSrc = null;
        let playbackSpeed = 1;
        let isPlaying = false;
        let audioElement = document.getElementById('audioPlayer');
        
        // 初始化
        audioElement.addEventListener('ended', () => {
            isPlaying = false;
            updatePlayButton();
        });
        
        // 文件导入
        document.getElementById('audioFile').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                audioSrc = URL.createObjectURL(file);
                audioElement.src = audioSrc;
                document.getElementById('currentTitle').textContent = file.name;
            }
        });
        
        document.getElementById('jsonFile').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    document.getElementById('jsonEditor').value = event.target.result;
                    loadData();
                };
                reader.readAsText(file);
            }
        });
        
        // 加载数据
        function loadData() {
            try {
                const data = JSON.parse(document.getElementById('jsonEditor').value);
                words = data.words || [];
                
                if (words.length === 0) {
                    alert('单词列表为空');
                    return;
                }
                
                // 显示单词列表预览
                const preview = document.getElementById('wordListPreview');
                const tags = document.getElementById('wordTags');
                tags.innerHTML = words.map(w => `<span class="word-tag">${w}</span>`).join('');
                preview.style.display = 'block';
                
                // 初始化练习
                currentIndex = 0;
                userAnswers = new Array(words.length).fill('');
                updateProgress();
                renderPracticeArea();
                
            } catch (e) {
                alert('JSON格式错误: ' + e.message);
            }
        }
        
        // 设置模式
        function setMode(mode) {
            currentMode = mode;
            document.querySelectorAll('.mode-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            renderPracticeArea();
        }
        
        // 设置倍速
        function setSpeed(speed) {
            playbackSpeed = speed;
            audioElement.playbackRate = speed;
            document.querySelectorAll('.speed-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.textContent === speed + 'x') {
                    btn.classList.add('active');
                }
            });
        }
        
        // 播放控制
        function togglePlay() {
            if (!audioSrc) {
                alert('请先选择音频文件');
                return;
            }
            
            if (isPlaying) {
                audioElement.pause();
                isPlaying = false;
            } else {
                audioElement.play();
                isPlaying = true;
            }
            updatePlayButton();
        }
        
        function updatePlayButton() {
            document.getElementById('playBtn').textContent = isPlaying ? '⏸' : '▶';
        }
        
        // 渲染练习区域
        function renderPracticeArea() {
            const area = document.getElementById('practiceArea');
            
            if (words.length === 0) {
                area.innerHTML = `
                    <div class="hint">
                        <div class="hint-icon">📂</div>
                        <p>请先导入音频文件和单词数据</p>
                    </div>
                `;
                return;
            }
            
            if (currentMode === 'single') {
                renderSingleMode(area);
            } else {
                renderBatchMode(area);
            }
        }
        
        // 单词模式
        function renderSingleMode(area) {
            const word = words[currentIndex];
            const userAnswer = userAnswers[currentIndex] || '';
            const isChecked = userAnswer !== '';
            const isCorrect = isChecked && userAnswer.toLowerCase().trim() === word.toLowerCase();
            
            area.innerHTML = `
                <div class="word-input-container">
                    <div class="current-word-info">
                        <div class="word-number">第 ${currentIndex + 1} / ${words.length} 个单词</div>
                    </div>
                    
                    <input type="text" 
                           class="word-input ${isChecked ? (isCorrect ? 'correct' : 'wrong') : ''}" 
                           id="wordInput"
                           value="${userAnswer}"
                           placeholder="输入听到的单词..."
                           ${isChecked ? 'disabled' : ''}
                           onkeypress="handleInputKeypress(event)">
                    
                    <div class="action-btns">
                        <button class="action-btn btn-secondary" onclick="prevWord()" ${currentIndex === 0 ? 'disabled' : ''}>上一个</button>
                        ${!isChecked ? 
                            `<button class="action-btn btn-success" onclick="checkAnswer()">确认</button>` :
                            `<button class="action-btn btn-primary" onclick="nextWord()">${currentIndex < words.length - 1 ? '下一个' : '完成'}</button>`
                        }
                    </div>
                    
                    ${isChecked ? `
                        <div style="text-align: center; margin-top: 10px;">
                            ${isCorrect ? 
                                '<span style="color: #4ade80;">✓ 正确!</span>' : 
                                `<span style="color: #f87171;">✗ 正确答案: ${word}</span>`
                            }
                        </div>
                    ` : ''}
                </div>
            `;
            
            if (!isChecked) {
                document.getElementById('wordInput').focus();
            }
        }
        
        // 整段模式
        function renderBatchMode(area) {
            let html = `
                <div class="batch-mode">
                    <p style="text-align: center; color: #888; margin-bottom: 15px;">
                        听完整段音频后，在下方输入所有听到的单词
                    </p>
                    <div class="words-list">
            `;
            
            words.forEach((word, index) => {
                const userAnswer = userAnswers[index] || '';
                const isChecked = userAnswer !== '';
                const isCorrect = isChecked && userAnswer.toLowerCase().trim() === word.toLowerCase();
                
                html += `
                    <input type="text" 
                           class="batch-input ${isChecked ? (isCorrect ? 'correct' : 'wrong') : ''}" 
                           id="batchInput-${index}"
                           value="${userAnswer}"
                           placeholder="${index + 1}."
                           ${isChecked ? 'disabled' : ''}
                           onkeypress="handleBatchKeypress(event, ${index})">
                `;
            });
            
            html += `
                    </div>
                    <div class="action-btns" style="margin-top: 20px; justify-content: center;">
                        <button class="action-btn btn-success" onclick="checkAllAnswers()">提交答案</button>
                        <button class="action-btn btn-secondary" onclick="clearAll()">清空</button>
                    </div>
                </div>
            `;
            
            area.innerHTML = html;
        }
        
        // 输入处理
        function handleInputKeypress(e) {
            if (e.key === 'Enter') {
                const input = document.getElementById('wordInput');
                if (!input.disabled) {
                    checkAnswer();
                } else {
                    nextWord();
                }
            }
        }
        
        function handleBatchKeypress(e, index) {
            if (e.key === 'Enter') {
                const nextInput = document.getElementById(`batchInput-${index + 1}`);
                if (nextInput) {
                    nextInput.focus();
                }
            }
        }
        
        // 单词模式功能
        function checkAnswer() {
            const input = document.getElementById('wordInput');
            userAnswers[currentIndex] = input.value;
            updateProgress();
            renderPracticeArea();
        }
        
        function nextWord() {
            if (currentIndex < words.length - 1) {
                currentIndex++;
                renderPracticeArea();
            } else {
                showResult();
            }
        }
        
        function prevWord() {
            if (currentIndex > 0) {
                currentIndex--;
                renderPracticeArea();
            }
        }
        
        // 整段模式功能
        function checkAllAnswers() {
            words.forEach((word, index) => {
                const input = document.getElementById(`batchInput-${index}`);
                if (input) {
                    userAnswers[index] = input.value;
                    input.disabled = true;
                }
            });
            updateProgress();
            renderPracticeArea();
            showResult();
        }
        
        function clearAll() {
            userAnswers = new Array(words.length).fill('');
            renderPracticeArea();
            updateProgress();
        }
        
        // 更新进度
        function updateProgress() {
            const answered = userAnswers.filter(a => a !== '').length;
            const correct = userAnswers.filter((a, i) => a.toLowerCase().trim() === words[i].toLowerCase()).length;
            const accuracy = answered > 0 ? Math.round((correct / answered) * 100) : 0;
            
            document.getElementById('progress').textContent = `${answered}/${words.length}`;
            document.getElementById('accuracy').textContent = `${accuracy}%`;
        }
        
        // 显示结果
        function showResult() {
            const correct = userAnswers.filter((a, i) => a.toLowerCase().trim() === words[i].toLowerCase()).length;
            const wrong = words.length - correct;
            const score = Math.round((correct / words.length) * 100);
            
            document.getElementById('resultScore').textContent = score + '%';
            document.getElementById('resultDetail').textContent = `${correct} 正确 / ${wrong} 错误`;
            document.getElementById('resultOverlay').classList.add('show');
        }
        
        function closeResult() {
            document.getElementById('resultOverlay').classList.remove('show');
        }
        
        function restart() {
            currentIndex = 0;
            userAnswers = new Array(words.length).fill('');
            updateProgress();
            renderPracticeArea();
            closeResult();
        }
        
        // 全局快捷键
        document.addEventListener('keydown', (e) => {
            if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') {
                return;
            }
            
            switch(e.code) {
                case 'Space':
                    e.preventDefault();
                    togglePlay();
                    break;
                case 'ArrowUp':
                    if (currentMode === 'single') prevWord();
                    break;
                case 'ArrowDown':
                case 'Enter':
                    if (currentMode === 'single') {
                        const input = document.getElementById('wordInput');
                        if (input && !input.disabled) {
                            checkAnswer();
                        } else {
                            nextWord();
                        }
                    }
                    break;
            }
        });
    </script>
</body>
</html>
