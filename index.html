<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>雅思王听力听写练习</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
            padding: 20px;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        
        h1 {
            text-align: center;
            margin-bottom: 10px;
            font-size: 1.8rem;
            background: linear-gradient(90deg, #00d4ff, #7b2cbf);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .subtitle {
            text-align: center;
            color: #888;
            margin-bottom: 20px;
            font-size: 0.9rem;
        }
        
        /* 章节选择 */
        .chapter-selector {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            backdrop-filter: blur(10px);
        }
        
        .chapter-selector h3 {
            margin-bottom: 15px;
            color: #888;
            font-size: 1rem;
        }
        
        .chapter-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 10px;
        }
        
        .chapter-btn {
            padding: 12px;
            border: 2px solid #333;
            background: transparent;
            color: #888;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.9rem;
            text-align: center;
        }
        
        .chapter-btn:hover {
            border-color: #555;
            color: #aaa;
        }
        
        .chapter-btn.active {
            border-color: #00d4ff;
            color: #00d4ff;
            background: rgba(0, 212, 255, 0.1);
        }
        
        /* 音频模式选择 */
        .audio-mode {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            backdrop-filter: blur(10px);
        }
        
        .audio-mode h3 {
            margin-bottom: 15px;
            color: #888;
            font-size: 1rem;
        }
        
        .mode-options {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .mode-btn {
            padding: 10px 20px;
            border: 2px solid #333;
            background: transparent;
            color: #888;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.9rem;
        }
        
        .mode-btn.active {
            border-color: #00d4ff;
            color: #00d4ff;
            background: rgba(0, 212, 255, 0.1);
        }
        
        /* 控制面板 */
        .control-panel {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            backdrop-filter: blur(10px);
        }
        
        .audio-controls {
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        .play-btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(135deg, #00d4ff, #7b2cbf);
            color: white;
            font-size: 24px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .play-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.4);
        }
        
        .play-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        
        .speed-control {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .speed-label {
            color: #888;
            font-size: 0.9rem;
        }
        
        .speed-btn {
            padding: 8px 16px;
            border: 1px solid #444;
            background: transparent;
            color: #888;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.85rem;
        }
        
        .speed-btn:hover, .speed-btn.active {
            border-color: #00d4ff;
            color: #00d4ff;
            background: rgba(0, 212, 255, 0.1);
        }
        
        .progress-info {
            display: flex;
            justify-content: space-between;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid rgba(255,255,255,0.1);
            font-size: 0.9rem;
            color: #888;
        }
        
        .stats {
            display: flex;
            gap: 20px;
        }
        
        .stat {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .stat-value {
            color: #00d4ff;
            font-weight: bold;
        }
        
        /* 练习模式选择 */
        .practice-mode-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            justify-content: center;
        }
        
        /* 练习区域 */
        .practice-area {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            backdrop-filter: blur(10px);
            min-height: 300px;
        }
        
        .word-input-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }
        
        .current-word-info {
            text-align: center;
        }
        
        .word-number {
            color: #888;
            font-size: 0.9rem;
            margin-bottom: 5px;
        }
        
        .word-input {
            width: 100%;
            max-width: 400px;
            padding: 15px 20px;
            font-size: 1.3rem;
            border: 2px solid #444;
            border-radius: 12px;
            background: rgba(0,0,0,0.3);
            color: #fff;
            text-align: center;
            transition: border-color 0.3s;
        }
        
        .word-input:focus {
            outline: none;
            border-color: #00d4ff;
        }
        
        .word-input.correct {
            border-color: #4ade80;
            background: rgba(74, 222, 128, 0.1);
        }
        
        .word-input.wrong {
            border-color: #f87171;
            background: rgba(248, 113, 113, 0.1);
        }
        
        .action-btns {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        .action-btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.95rem;
            transition: all 0.2s;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #00d4ff, #7b2cbf);
            color: white;
        }
        
        .btn-secondary {
            background: rgba(255,255,255,0.1);
            color: #fff;
        }
        
        .btn-success {
            background: #4ade80;
            color: #000;
        }
        
        .action-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
        }
        
        .action-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        
        /* 整段模式 - 单词列表 */
        .batch-mode .words-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 10px;
            margin-top: 20px;
        }
        
        .batch-input {
            padding: 12px;
            border: 2px solid #444;
            border-radius: 8px;
            background: rgba(0,0,0,0.3);
            color: #fff;
            font-size: 1rem;
            text-align: center;
            transition: all 0.3s;
        }
        
        .batch-input:focus {
            outline: none;
            border-color: #00d4ff;
        }
        
        .batch-input.correct {
            border-color: #4ade80;
            background: rgba(74, 222, 128, 0.1);
        }
        
        .batch-input.wrong {
            border-color: #f87171;
            background: rgba(248, 113, 113, 0.1);
        }
        
        .batch-input:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        /* 结果显示 */
        .result-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.9);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            backdrop-filter: blur(10px);
        }
        
        .result-overlay.show {
            display: flex;
        }
        
        .result-card {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            max-width: 400px;
            width: 90%;
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .result-title {
            font-size: 1.5rem;
            margin-bottom: 20px;
        }
        
        .result-score {
            font-size: 4rem;
            font-weight: bold;
            background: linear-gradient(90deg, #00d4ff, #7b2cbf);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }
        
        .result-detail {
            color: #888;
            margin-bottom: 30px;
        }
        
        /* 单词本列表 */
        .word-list-preview {
            margin-top: 20px;
            max-height: 200px;
            overflow-y: auto;
            background: rgba(0,0,0,0.2);
            border-radius: 8px;
            padding: 15px;
        }
        
        .word-list-preview h4 {
            margin-bottom: 10px;
            color: #888;
            font-size: 0.9rem;
        }
        
        .word-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        
        .word-tag {
            padding: 5px 12px;
            background: rgba(0, 212, 255, 0.15);
            border-radius: 15px;
            font-size: 0.85rem;
            color: #00d4ff;
        }
        
        /* 响应式 */
        @media (max-width: 600px) {
            h1 {
                font-size: 1.4rem;
            }
            
            .chapter-grid {
                grid-template-columns: repeat(3, 1fr);
            }
            
            .speed-control {
                flex-wrap: wrap;
                justify-content: center;
            }
            
            .batch-mode .words-list {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        
        /* 提示信息 */
        .hint {
            text-align: center;
            color: #666;
            padding: 40px;
            font-size: 0.95rem;
        }
        
        .hint-icon {
            font-size: 3rem;
            margin-bottom: 15px;
            opacity: 0.5;
        }
        
        /* 快捷键提示 */
        .shortcuts {
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px solid rgba(255,255,255,0.1);
            font-size: 0.8rem;
            color: #666;
            text-align: center;
        }
        
        .shortcut-key {
            display: inline-block;
            padding: 2px 8px;
            background: rgba(255,255,255,0.1);
            border-radius: 4px;
            margin: 0 3px;
            font-family: monospace;
        }
        
        /* 文件上传区域 */
        .file-upload-area {
            border: 2px dashed #444;
            border-radius: 12px;
            padding: 30px;
            text-align: center;
            margin-top: 15px;
            transition: all 0.3s;
        }
        
        .file-upload-area:hover {
            border-color: #00d4ff;
            background: rgba(0, 212, 255, 0.05);
        }
        
        .file-input {
            display: none;
        }
        
        .file-label {
            color: #888;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }
        
        .file-label span {
            font-size: 2rem;
        }
        
        .tts-info {
            background: rgba(0, 212, 255, 0.1);
            border: 1px solid rgba(0, 212, 255, 0.3);
            border-radius: 8px;
            padding: 15px;
            margin-top: 15px;
            text-align: center;
            color: #00d4ff;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎧 雅思王听力听写练习</h1>
        <p class="subtitle">IELTS Listening Dictation Practice</p>
        
        <!-- 章节选择 -->
        <div class="chapter-selector">
            <h3>📚 选择章节</h3>
            <div class="chapter-grid">
                <button class="chapter-btn" onclick="selectChapter(3)">Chapter 3<br><small>住宿旅游</small></button>
                <button class="chapter-btn" onclick="selectChapter(4)">Chapter 4<br><small>学术课程</small></button>
                <button class="chapter-btn" onclick="selectChapter(5)">Chapter 5<br><small>工作求职</small></button>
                <button class="chapter-btn" onclick="selectChapter(6)">Chapter 6<br><small>医疗场景</small></button>
                <button class="chapter-btn" onclick="selectChapter(7)">Chapter 7<br><small>银行购物</small></button>
                <button class="chapter-btn" onclick="selectChapter(8)">Chapter 8<br><small>动植物</small></button>
                <button class="chapter-btn" onclick="selectChapter(9)">Chapter 9<br><small>建筑地理</small></button>
                <button class="chapter-btn" onclick="selectChapter(10)">Chapter 10<br><small>其他场景</small></button>
            </div>
            <div class="word-list-preview" id="wordListPreview" style="display: none;">
                <h4>当前单词列表</h4>
                <div class="word-tags" id="wordTags"></div>
            </div>
        </div>
        
        <!-- 音频模式选择 -->
        <div class="audio-mode">
            <h3>🎵 音频模式</h3>
            <div class="mode-options">
                <button class="mode-btn active" onclick="setAudioMode('tts')">🔊 系统朗读</button>
                <button class="mode-btn" onclick="setAudioMode('file')">📁 本地音频</button>
            </div>
            
            <!-- TTS模式提示 -->
            <div class="tts-info" id="ttsInfo">
                💡 系统朗读模式：点击播放按钮，系统会语音朗读单词
            </div>
            
            <!-- 文件上传区域 -->
            <div class="file-upload-area" id="fileUploadArea" style="display: none;">
                <input type="file" id="audioFile" class="file-input" accept="audio/*">
                <label for="audioFile" class="file-label">
                    <span>📂</span>
                    <div>点击选择音频文件<br><small>支持 mp3, wav, m4a 格式</small></div>
                </label>
            </div>
        </div>
        
        <!-- 练习模式选择 -->
        <div class="practice-mode-selector">
            <button class="mode-btn active" onclick="setPracticeMode('single')">🔤 单词模式</button>
            <button class="mode-btn" onclick="setPracticeMode('batch')">📝 整段模式</button>
        </div>
        
        <!-- 控制面板 -->
        <div class="control-panel">
            <div class="audio-controls">
                <button class="play-btn" id="playBtn" onclick="togglePlay()" disabled>▶</button>
                
                <div class="speed-control">
                    <span class="speed-label">倍速:</span>
                    <button class="speed-btn" onclick="setSpeed(0.5)">0.5x</button>
                    <button class="speed-btn" onclick="setSpeed(0.75)">0.75x</button>
                    <button class="speed-btn active" onclick="setSpeed(1)">1x</button>
                    <button class="speed-btn" onclick="setSpeed(1.25)">1.25x</button>
                    <button class="speed-btn" onclick="setSpeed(1.5)">1.5x</button>
                    <button class="speed-btn" onclick="setSpeed(2)">2x</button>
                </div>
            </div>
            
            <div class="progress-info">
                <span id="currentTitle">请先选择章节</span>
                <div class="stats">
                    <div class="stat">
                        <span>进度:</span>
                        <span class="stat-value" id="progress">0/0</span>
                    </div>
                    <div class="stat">
                        <span>正确率:</span>
                        <span class="stat-value" id="accuracy">0%</span>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 练习区域 -->
        <div class="practice-area" id="practiceArea">
            <div class="hint">
                <div class="hint-icon">📚</div>
                <p>请先选择上方章节开始学习</p>
                <p style="margin-top: 10px; font-size: 0.85rem;">支持 Chapter 3-10 全部单词</p>
            </div>
        </div>
        
        <div class="shortcuts">
            快捷键: <span class="shortcut-key">Space</span> 播放/暂停 
            <span class="shortcut-key">Enter</span> 确认/下一题 
            <span class="shortcut-key">↑</span> 上一个 
            <span class="shortcut-key">↓</span> 下一个
        </div>
    </div>
    
    <!-- 结果弹窗 -->
    <div class="result-overlay" id="resultOverlay">
        <div class="result-card">
            <h2 class="result-title">🎉 练习完成!</h2>
            <div class="result-score" id="resultScore">0%</div>
            <p class="result-detail" id="resultDetail">0 正确 / 0 错误</p>
            <button class="action-btn btn-primary" onclick="restart()">再来一次</button>
            <button class="action-btn btn-secondary" onclick="closeResult()">查看详情</button>
        </div>
    </div>
    
    <audio id="audioPlayer"></audio>
    
    <script>

            8: {
                title: "Chapter 8 - 动植物与农业",
                words: ["animal", "mammal", "bird", "fish", "reptile", "amphibian", "insect", "creature", "species", "breed", "pet", "dog", "cat", "horse", "cow", "cattle", "sheep", "goat", "pig", "chicken", "duck", "goose", "rabbit", "mouse", "rat", "elephant", "lion", "tiger", "bear", "wolf", "fox", "deer", "monkey", "snake", "plant", "flower", "tree", "grass", "bush", "shrub", "vegetable", "fruit", "grain", "crop", "wheat", "rice", "corn", "barley", "oats", "farm", "farmer", "farming", "agriculture", "cultivation", "harvest", "field", "pasture", "meadow", "orchard", "vineyard", "garden", "greenhouse", "soil", "earth", "ground", "land", "fertilizer", "pesticide", "irrigation", "water", "seed", "sow", "plant", "grow", "growth", "ripe", "mature", "organic", "natural", "wild", "domestic", "tame", "environment", "habitat", "ecosystem", "nature", "conservation", "protection", "extinction", "endangered", "rare", "common"]
            },
            9: {
                title: "Chapter 9 - 建筑与地理",
                words: ["building", "architecture", "structure", "construction", "house", "home", "flat", "apartment", "villa", "mansion", "palace", "castle", "tower", "skyscraper", "high-rise", "block", "complex", "estate", "property", "residence", "dwelling", "shelter", "accommodation", "room", "hall", "lobby", "corridor", "passage", "stair", "staircase", "elevator", "lift", "escalator", "door", "window", "wall", "roof", "ceiling", "floor", "ground", "foundation", "basement", "attic", "garage", "garden", "yard", "gate", "fence", "bridge", "tunnel", "road", "street", "avenue", "boulevard", "lane", "path", "track", "trail", "highway", "motorway", "freeway", "railway", "railroad", "station", "stop", "terminal", "port", "harbor", "harbour", "dock", "pier", "airport", "city", "town", "village", "country", "countryside", "rural", "urban", "suburb", "suburban", "downtown", "center", "centre", "district", "area", "region", "zone", "location", "site", "place", "position", "address", "map", "atlas", "globe", "earth", "world", "continent", "country", "nation", "state", "province", "county", "city", "capital", "border", "boundary", "coast", "coastal", "beach", "shore", "seaside", "mountain", "hill", "valley", "river", "lake", "sea", "ocean", "forest", "wood", "jungle", "desert", "island", "peninsula", "climate", "weather", "temperature", "season", "spring", "summer", "autumn", "fall", "winter"]
            },
            10: {
                title: "Chapter 10 - 其他场景",
                words: ["weather", "sunny", "cloudy", "rainy", "windy", "snowy", "foggy", "stormy", "temperature", "degree", "climate", "season", "time", "morning", "afternoon", "evening", "night", "midnight", "noon", "dawn", "dusk", "sunrise", "sunset", "day", "date", "week", "month", "year", "century", "decade", "today", "tomorrow", "yesterday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday", "Sunday", "January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December", "colour", "color", "red", "blue", "green", "yellow", "orange", "purple", "pink", "brown", "black", "white", "grey", "gray", "shape", "circle", "square", "triangle", "rectangle", "round", "size", "big", "small", "large", "tiny", "huge", "material", "wood", "wooden", "metal", "metallic", "plastic", "glass", "cotton", "wool", "silk", "leather", "stone", "rock", "gold", "silver", "direction", "north", "south", "east", "west", "left", "right", "straight", "turn", "corner", "crossing", "junction", "traffic", "vehicle", "car", "bus", "truck", "lorry", "van", "taxi", "cab", "train", "subway", "underground", "metro", "bike", "bicycle", "motorcycle", "ship", "boat", "vessel", "plane", "aircraft"]
            }
        };

        // 状态管理
        let currentChapter = null;
        let currentPracticeMode = 'single'; // 'single' 或 'batch'
        let currentAudioMode = 'tts'; // 'tts' 或 'file'
        let words = [];
        let currentIndex = 0;
        let userAnswers = [];
        let audioSrc = null;
        let playbackSpeed = 1;
        let isPlaying = false;
        let audioElement = document.getElementById('audioPlayer');
        let speechSynthesis = window.speechSynthesis;
        
        // 初始化
        audioElement.addEventListener('ended', () => {
            isPlaying = false;
            updatePlayButton();
        });
        
        // 选择章节
        function selectChapter(chapter) {
            currentChapter = chapter;
            words = wordDatabase[chapter].words;
            
            // 更新UI
            document.querySelectorAll('.chapter-btn').forEach((btn, index) => {
                btn.classList.toggle('active', index === chapter - 3);
            });
            
            // 显示单词列表
            const preview = document.getElementById('wordListPreview');
            const tags = document.getElementById('wordTags');
            tags.innerHTML = words.map(w => `<span class="word-tag">${w}</span>`).join('');
            preview.style.display = 'block';
            
            // 初始化练习
            currentIndex = 0;
            userAnswers = new Array(words.length).fill('');
            document.getElementById('currentTitle').textContent = wordDatabase[chapter].title;
            document.getElementById('playBtn').disabled = false;
            updateProgress();
            renderPracticeArea();
        }
        
        // 设置音频模式
        function setAudioMode(mode) {
            currentAudioMode = mode;
            document.querySelectorAll('.audio-mode .mode-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            
            document.getElementById('ttsInfo').style.display = mode === 'tts' ? 'block' : 'none';
            document.getElementById('fileUploadArea').style.display = mode === 'file' ? 'block' : 'none';
        }
        
        // 设置练习模式
        function setPracticeMode(mode) {
            currentPracticeMode = mode;
            document.querySelectorAll('.practice-mode-selector .mode-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            renderPracticeArea();
        }
        
        // 文件导入
        document.getElementById('audioFile').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                audioSrc = URL.createObjectURL(file);
                audioElement.src = audioSrc;
            }
        });
        
        // 设置倍速
        function setSpeed(speed) {
            playbackSpeed = speed;
            audioElement.playbackRate = speed;
            document.querySelectorAll('.speed-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.textContent === speed + 'x') {
                    btn.classList.add('active');
                }
            });
        }
        
        // 播放控制
        function togglePlay() {
            if (currentAudioMode === 'tts') {
                playTTS();
            } else {
                playAudioFile();
            }
        }
        
        function playTTS() {
            if (!currentChapter) {
                alert('请先选择章节');
                return;
            }
            
            const word = words[currentIndex];
            if (!word) return;
            
            // 停止当前播放
            speechSynthesis.cancel();
            
            const utterance = new SpeechSynthesisUtterance(word);
            utterance.lang = 'en-US';
            utterance.rate = playbackSpeed;
            utterance.pitch = 1;
            
            utterance.onstart = () => {
                isPlaying = true;
                updatePlayButton();
            };
            
            utterance.onend = () => {
                isPlaying = false;
                updatePlayButton();
            };
            
            speechSynthesis.speak(utterance);
        }
        
        function playAudioFile() {
            if (!audioSrc) {
                alert('请先选择音频文件');
                return;
            }
            
            if (isPlaying) {
                audioElement.pause();
                isPlaying = false;
            } else {
                audioElement.play();
                isPlaying = true;
            }
            updatePlayButton();
        }
        
        function updatePlayButton() {
            document.getElementById('playBtn').textContent = isPlaying ? '⏸' : '▶';
        }
        
        // 渲染练习区域
        function renderPracticeArea() {
            const area = document.getElementById('practiceArea');
            
            if (!currentChapter) {
                area.innerHTML = `
                    <div class="hint">
                        <div class="hint-icon">📚</div>
                        <p>请先选择上方章节开始学习</p>
                    </div>
                `;
                return;
            }
            
            if (currentPracticeMode === 'single') {
                renderSingleMode(area);
            } else {
                renderBatchMode(area);
            }
        }
        
        // 单词模式
        function renderSingleMode(area) {
            const word = words[currentIndex];
            const userAnswer = userAnswers[currentIndex] || '';
            const isChecked = userAnswer !== '';
            const isCorrect = isChecked && userAnswer.toLowerCase().trim() === word.toLowerCase();
            
            area.innerHTML = `
                <div class="word-input-container">
                    <div class="current-word-info">
                        <div class="word-number">第 ${currentIndex + 1} / ${words.length} 个单词</div>
                    </div>
                    
                    <input type="text" 
                           class="word-input ${isChecked ? (isCorrect ? 'correct' : 'wrong') : ''}" 
                           id="wordInput"
                           value="${userAnswer}"
                           placeholder="输入听到的单词..."
                           ${isChecked ? 'disabled' : ''}
                           onkeypress="handleInputKeypress(event)">
                    
                    <div class="action-btns">
                        <button class="action-btn btn-secondary" onclick="prevWord()" ${currentIndex === 0 ? 'disabled' : ''}>上一个</button>
                        ${!isChecked ? 
                            `<button class="action-btn btn-success" onclick="checkAnswer()">确认</button>` :
                            `<button class="action-btn btn-primary" onclick="nextWord()">${currentIndex < words.length - 1 ? '下一个' : '完成'}</button>`
                        }
                    </div>
                    
                    ${isChecked ? `
                        <div style="text-align: center; margin-top: 10px;">
                            ${isCorrect ? 
                                '<span style="color: #4ade80;">✓ 正确!</span>' : 
                                `<span style="color: #f87171;">✗ 正确答案: ${word}</span>`
                            }
                        </div>
                    ` : ''}
                </div>
            `;
            
            if (!isChecked) {
                document.getElementById('wordInput').focus();
            }
        }
        
        // 整段模式
        function renderBatchMode(area) {
            let html = `
                <div class="batch-mode">
                    <p style="text-align: center; color: #888; margin-bottom: 15px;">
                        听完整段音频后，在下方输入所有听到的单词
                    </p>
                    <div class="words-list">
            `;
            
            words.forEach((word, index) => {
                const userAnswer = userAnswers[index] || '';
                const isChecked = userAnswer !== '';
                const isCorrect = isChecked && userAnswer.toLowerCase().trim() === word.toLowerCase();
                
                html += `
                    <input type="text" 
                           class="batch-input ${isChecked ? (isCorrect ? 'correct' : 'wrong') : ''}" 
                           id="batchInput-${index}"
                           value="${userAnswer}"
                           placeholder="${index + 1}."
                           ${isChecked ? 'disabled' : ''}
                           onkeypress="handleBatchKeypress(event, ${index})">
                `;
            });
            
            html += `
                    </div>
                    <div class="action-btns" style="margin-top: 20px; justify-content: center;">
                        <button class="action-btn btn-success" onclick="checkAllAnswers()">提交答案</button>
                        <button class="action-btn btn-secondary" onclick="clearAll()">清空</button>
                    </div>
                </div>
            `;
            
            area.innerHTML = html;
        }
        
        // 输入处理
        function handleInputKeypress(e) {
            if (e.key === 'Enter') {
                const input = document.getElementById('wordInput');
                if (!input.disabled) {
                    checkAnswer();
                } else {
                    nextWord();
                }
            }
        }
        
        function handleBatchKeypress(e, index) {
            if (e.key === 'Enter') {
                const nextInput = document.getElementById(`batchInput-${index + 1}`);
                if (nextInput) {
                    nextInput.focus();
                }
            }
        }
        
        // 单词模式功能
        function checkAnswer() {
            const input = document.getElementById('wordInput');
            userAnswers[currentIndex] = input.value;
            updateProgress();
            renderPracticeArea();
        }
        
        function nextWord() {
            if (currentIndex < words.length - 1) {
                currentIndex++;
                renderPracticeArea();
            } else {
                showResult();
            }
        }
        
        function prevWord() {
            if (currentIndex > 0) {
                currentIndex--;
                renderPracticeArea();
            }
        }
        
        // 整段模式功能
        function checkAllAnswers() {
            words.forEach((word, index) => {
                const input = document.getElementById(`batchInput-${index}`);
                if (input) {
                    userAnswers[index] = input.value;
                    input.disabled = true;
                }
            });
            updateProgress();
            renderPracticeArea();
            showResult();
        }
        
        function clearAll() {
            userAnswers = new Array(words.length).fill('');
            renderPracticeArea();
            updateProgress();
        }
        
        // 更新进度
        function updateProgress() {
            const answered = userAnswers.filter(a => a !== '').length;
            const correct = userAnswers.filter((a, i) => a.toLowerCase().trim() === words[i].toLowerCase()).length;
            const accuracy = answered > 0 ? Math.round((correct / answered) * 100) : 0;
            
            document.getElementById('progress').textContent = `${answered}/${words.length}`;
            document.getElementById('accuracy').textContent = `${accuracy}%`;
        }
        
        // 显示结果
        function showResult() {
            const correct = userAnswers.filter((a, i) => a.toLowerCase().trim() === words[i].toLowerCase()).length;
            const wrong = words.length - correct;
            const score = Math.round((correct / words.length) * 100);
            
            document.getElementById('resultScore').textContent = score + '%';
            document.getElementById('resultDetail').textContent = `${correct} 正确 / ${wrong} 错误`;
            document.getElementById('resultOverlay').classList.add('show');
        }
        
        function closeResult() {
            document.getElementById('resultOverlay').classList.remove('show');
        }
        
        function restart() {
            currentIndex = 0;
            userAnswers = new Array(words.length).fill('');
            updateProgress();
            renderPracticeArea();
            closeResult();
        }
        
        // 全局快捷键
        document.addEventListener('keydown', (e) => {
            if (e.target.tagName === 'INPUT') {
                return;
            }
            
            switch(e.code) {
                case 'Space':
                    e.preventDefault();
                    togglePlay();
                    break;
                case 'ArrowUp':
                    if (currentPracticeMode === 'single') prevWord();
                    break;
                case 'ArrowDown':
                case 'Enter':
                    if (currentPracticeMode === 'single') {
                        const input = document.getElementById('wordInput');
                        if (input && !input.disabled) {
                            checkAnswer();
                        } else {
                            nextWord();
                        }
                    }
                    break;
            }
        });
    </script>
</body>
</html>
